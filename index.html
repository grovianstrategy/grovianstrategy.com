<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>그로비안 스트래티지 — Grovian Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--deep:#2C3E35;--forest:#3D5A4A;--canopy:#4A7C59;--shield:#7AB38A;--leaf:#B8D4BE;--mist:#B8D4BF;--slate:#5B7280;--cloud:#E8EDF0;--birch:#F0F4F1;--offwh:#F7FAF8;--white:#FFFFFF;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR','DM Sans',sans-serif;color:var(--deep);background:var(--white);overflow-x:hidden;word-break:keep-all;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:70px;background:rgba(44,62,53,0.97);backdrop-filter:blur(8px);}
nav img{height:36px;cursor:pointer;}
.nav-links{display:flex;align-items:center;gap:1.6rem;}
.nav-links a{color:var(--mist);text-decoration:none;font-size:13px;cursor:pointer;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--white);}
.nav-cta{background:var(--shield);color:var(--deep)!important;font-weight:500!important;padding:7px 18px;border-radius:4px;}
.lang-btn{background:transparent;border:1px solid var(--mist);color:var(--mist);padding:5px 12px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
.lang-btn:hover{border-color:var(--white);color:var(--white);}
.page{display:none;min-height:100vh;padding-top:70px;}
.page.active{display:block;}
.hero{min-height:calc(100vh - 70px);background:var(--deep);display:flex;align-items:center;padding:80px 5vw;position:relative;overflow:hidden;}
.hero.short{min-height:52vh;}
.hero::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:var(--forest);opacity:.5;top:-150px;right:-100px;}
.hero::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:var(--canopy);opacity:.25;bottom:-80px;right:200px;}
.hero-content{position:relative;z-index:1;max-width:720px;}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--shield);margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;}
.eyebrow::before{content:'';display:block;width:32px;height:1px;background:var(--shield);}
h1{font-family:'Noto Serif KR','Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,4.2rem);font-weight:600;line-height:1.25;color:var(--white);margin-bottom:1.5rem;}
h1 em{color:var(--shield);font-style:italic;}
.hero-p{font-size:1.05rem;line-height:1.9;color:var(--mist);max-width:540px;margin-bottom:2.5rem;font-weight:300;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-p{background:var(--shield);color:var(--deep);padding:14px 32px;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:background .2s;}
.btn-p:hover{background:var(--leaf);}
.btn-o{border:1px solid var(--mist);color:var(--mist);padding:14px 32px;border-radius:4px;font-size:14px;cursor:pointer;background:none;font-family:inherit;transition:all .2s;}
.btn-o:hover{border-color:var(--white);color:var(--white);}
.sec{padding:100px 5vw;}
.sec.gray{background:var(--birch);}
.sec.dark{background:var(--deep);}
.sec-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--shield);margin-bottom:1rem;display:flex;align-items:center;gap:12px;}
.sec-label::before{content:'';display:block;width:24px;height:1px;background:var(--shield);}
h2{font-family:'Noto Serif KR','Cormorant Garamond',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:600;line-height:1.3;margin-bottom:1.5rem;}
h2.w{color:var(--white);}
.lead{font-size:1rem;line-height:1.9;color:var(--slate);font-weight:300;margin-bottom:1.5rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;}
.g2p{display:grid;grid-template-columns:repeat(2,1fr);gap:2rem;}
.card{background:var(--offwh);border-radius:8px;padding:2rem;border-left:3px solid var(--shield);transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(44,62,53,.08);}
.card h3{font-size:1rem;font-weight:500;color:var(--deep);margin-bottom:.75rem;}
.card p{font-size:.875rem;line-height:1.8;color:var(--slate);font-weight:300;}
.dc{background:rgba(61,90,74,.5);border:none;border-top:3px solid var(--canopy);border-radius:8px;padding:2rem;}
.dc .sn{font-family:'Noto Serif KR',serif;font-size:2.8rem;color:var(--canopy);opacity:.6;line-height:1;margin-bottom:.5rem;}
.dc h3{font-size:1.1rem;font-weight:500;color:var(--white);margin-bottom:.4rem;}
.dc .ss{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--shield);margin-bottom:.75rem;}
.dc p{font-size:.85rem;line-height:1.7;color:var(--mist);font-weight:300;}
.stat-card{background:var(--white);border-radius:8px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1.5rem;border-left:3px solid var(--shield);margin-bottom:1rem;}
.sn2{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:600;color:var(--canopy);white-space:nowrap;}
.sd{font-size:.9rem;color:var(--slate);font-weight:300;}
.dl{display:flex;flex-direction:column;gap:1.2rem;}
.di{display:flex;gap:1rem;align-items:flex-start;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--shield);flex-shrink:0;margin-top:7px;}
.di p{font-size:.95rem;line-height:1.8;color:var(--slate);font-weight:300;}
.quote{font-family:'Noto Serif KR','Cormorant Garamond',serif;font-size:1.35rem;line-height:1.9;font-style:italic;color:var(--forest);border-left:3px solid var(--shield);padding-left:1.5rem;}
.ec{background:var(--white);border-radius:8px;padding:2rem;border-top:3px solid var(--canopy);}
.ec.ft{background:var(--deep);border-top-color:var(--shield);}
.el{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--shield);margin-bottom:.5rem;}
.ec h3{font-size:1.2rem;font-weight:500;color:var(--deep);margin-bottom:.4rem;}
.ec.ft h3{color:var(--white);}
.ed{font-size:12px;font-style:italic;color:var(--slate);margin-bottom:1rem;}
.ec.ft .ed{color:var(--shield);}
.ediv{height:1px;background:var(--cloud);margin:1rem 0;}
.ec.ft .ediv{background:var(--forest);}
.ec p{font-size:.875rem;line-height:1.8;color:var(--slate);font-weight:300;}
.ec.ft p{color:var(--mist);}
.pc{background:var(--offwh);border-radius:12px;overflow:hidden;border:.5px solid var(--cloud);transition:transform .2s,box-shadow .2s;}
.pc:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(44,62,53,.1);}
.pi{height:180px;background:var(--forest);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.pi::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:var(--canopy);opacity:.3;top:-40px;right:-40px;}
.pt{position:absolute;top:14px;left:14px;background:var(--shield);color:var(--deep);font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;}
.pico{font-size:2.5rem;opacity:.7;}
.pb{padding:1.75rem;}
.pb h3{font-size:1.1rem;font-weight:500;color:var(--deep);margin-bottom:.5rem;}
.pco{font-size:12px;color:var(--shield);margin-bottom:1rem;font-weight:500;}
.pb p{font-size:.875rem;line-height:1.8;color:var(--slate);font-weight:300;margin-bottom:1.2rem;}
.prs{display:flex;gap:1.5rem;flex-wrap:wrap;}
.pr{text-align:center;}
.prn{font-family:'Noto Serif KR',serif;font-size:1.4rem;font-weight:600;color:var(--canopy);}
.prl{font-size:11px;color:var(--slate);}
.ph-box{text-align:center;padding:3rem 2rem;background:var(--birch);border-radius:12px;border:2px dashed var(--mist);margin-top:2rem;}
.ctbox{background:var(--birch);border-radius:12px;padding:2.5rem;}
.fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.fg label{font-size:13px;font-weight:500;color:var(--deep);}
.fg input,.fg textarea,.fg select{border:1px solid var(--cloud);border-radius:6px;padding:10px 14px;font-size:14px;font-family:inherit;background:var(--white);color:var(--deep);outline:none;transition:border-color .2s;width:100%;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--shield);}
.fg textarea{resize:vertical;min-height:120px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.accentbar{height:4px;background:var(--canopy);}
.tagf{font-family:'Noto Serif KR',serif;font-style:italic;color:var(--shield);font-size:1.1rem;margin-top:1.5rem;}
footer{background:var(--forest);padding:2rem 5vw;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
footer span,footer a{font-size:12px;color:var(--mist);font-weight:300;text-decoration:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.hero-content>*{animation:fadeUp .7s ease both;}
.eyebrow{animation-delay:.1s}.hero-content h1{animation-delay:.2s}.hero-p{animation-delay:.35s}.hero-btns{animation-delay:.5s}
@media(max-width:768px){.g2,.g3,.g4,.g2p{grid-template-columns:1fr;}.nav-links .np{display:none;}.fr{grid-template-columns:1fr;}}
</style>
</head>

let lang='ko',curPage='home';
const PAGES=['home','about','services','portfolio','contact'];

function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  curPage=id;
  renderNav();
  window.scrollTo(0,0);
}
function toggleLang(){lang=lang==='ko'?'en':'ko';render();}

function s(id,v){const e=document.getElementById(id);if(e)e.innerHTML=v;}
function ph(id,v){const e=document.getElementById(id);if(e)e.placeholder=v;}

function renderNav(){
  const t=lang==='ko'?KO:EN;
  document.getElementById('nav-root').innerHTML=
    '<nav><img src="data:image/jpeg;base64,'+NAV_B64+'" alt="Grovian" onclick="go(\'home\')">'+
    '<div class="nav-links">'+
    PAGES.map((p,i)=>'<a onclick="go(\''+p+'\')" class="np'+(p===curPage?' active':'')+'">'+t.nav[i]+'</a>').join('')+
    '<a onclick="go(\'contact\')" class="nav-cta">'+t.contact_btn+'</a>'+
    '<button class="lang-btn" onclick="toggleLang()">'+(lang==='ko'?'EN':'한')+'</button>'+
    '</div></nav>';
}

function card(h,p){return '<div class="card"><h3>'+h+'</h3><p>'+p+'</p></div>';}
function dcCard(n,h,ss,p){return '<div class="dc"><div class="sn">'+n+'</div><h3>'+h+'</h3><div class="ss">'+ss+'</div><p>'+p+'</p></div>';}
function engCard(e){return '<div class="ec'+(e[3]?' ft':'')+'"><div class="el">'+e[1]+'</div><h3>'+e[0]+'</h3><div class="ed">'+e[2]+'</div><div class="ediv"></div><p>'+e[4]+'</p></div>';}
function portCard(p){
  const rs=p[4].map(r=>{const pts=r.split(' ');return '<div class="pr"><div class="prn">'+pts[0]+'</div><div class="prl">'+pts.slice(1).join(' ')+'</div></div>';}).join('');
  return '<div class="pc"><div class="pi"><span class="pt">'+p[2]+'</span><div class="pico">🌱</div></div><div class="pb"><h3>'+p[0]+'</h3><div class="pco">'+p[1]+'</div><p>'+p[3]+'</p><div class="prs">'+rs+'</div></div></div>';
}
